<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Action100M Projected Tracks</title>
  <style>
    :root{color-scheme:dark;--bg:#101214;--panel:#181b1f;--text:#f2f4f7;--muted:#a8b0ba;--line:#2c3238;--accent:#5fb4ff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}
    header{position:sticky;top:0;z-index:2;background:rgba(16,18,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 20px}
    h1{font-size:18px;line-height:1.2;margin:0 0 10px}.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;color:var(--muted);font-size:13px}
    label{display:flex;align-items:center;gap:8px}input[type=range]{width:150px}main{padding:18px 20px 32px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
    .stage{position:relative;aspect-ratio:832/480;background:#050607}.stage img.frame,.stage canvas,.stage .mask{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.stage canvas{pointer-events:none}.stage .mask{opacity:.32;mix-blend-mode:screen;pointer-events:none}
    .meta{padding:12px 14px 14px}.meta h2{font-size:15px;line-height:1.25;margin:0 0 7px}.meta p{margin:5px 0;color:var(--muted);font-size:12px;line-height:1.35}a{color:var(--accent)}
  </style>
</head>
<body>
  <header>
    <h1>Action100M 32-frame projected mask-seeded tracks <span id="count"></span></h1>
    <div class="controls">
      <label>Line width <input id="gain" type="range" min="0.4" max="4" step="0.05" value="1.8"></label>
      <label>Opacity <input id="alpha" type="range" min="0.05" max="1" step="0.05" value="0.78"></label>
    </div>
  </header>
  <main><section class="grid"></section></main>
  <script>
    const DATA = __DATA__;
    const grid=document.querySelector('.grid'),gain=document.querySelector('#gain'),alpha=document.querySelector('#alpha'),cards=[];
    document.querySelector('#count').textContent=`${DATA.items.length} clips`;
    function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    function resize(c){const r=c.getBoundingClientRect(),d=devicePixelRatio||1,w=Math.max(1,Math.round(r.width*d)),h=Math.max(1,Math.round(r.height*d));if(c.width!==w||c.height!==h){c.width=w;c.height=h;}}
    function mediaRect(item,c){const cw=c.width,ch=c.height,vw=item.trackSize.w||832,vh=item.trackSize.h||480,cr=cw/ch,vr=vw/vh;if(vr>cr){const h=cw/vr;return{x:0,y:(ch-h)/2,w:cw,h};}const w=ch*vr;return{x:(cw-w)/2,y:0,w,h:ch};}
    const pointColor = (trace) => `hsl(${Math.round(225 - 225 * Math.max(0, Math.min(1, trace[0][1] || 0)))}, 96%, 58%)`;
    function setFrame(card,idx){card.frameIndex=Math.max(0,Math.min(card.item.frameCount-1,idx));card.frame.src=`${card.item.rgbFrameDir}/${card.item.rgbFrames[card.frameIndex]}`;draw(card);}
    function draw(card){const {item,canvas}=card;resize(canvas);const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);const rect=mediaRect(item,canvas),end=card.frameIndex||0,g=Number(gain.value),a=Number(alpha.value),d=devicePixelRatio||1;ctx.lineCap='round';ctx.lineJoin='round';for(const trace of item.traces){if(trace.length<2)continue;const color=pointColor(trace);for(let i=1;i<=end;i++){const p0=trace[i-1],p1=trace[i];if(p0[0]===null||p1[0]===null)continue;const x0=rect.x+p0[0]*rect.w,y0=rect.y+p0[1]*rect.h,x1=rect.x+p1[0]*rect.w,y1=rect.y+p1[1]*rect.h;ctx.globalAlpha=a*(.22+.78*(i/Math.max(1,item.frameCount-1)));ctx.strokeStyle=color;ctx.lineWidth=1.35*d*g;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();}const head=trace[end];if(head[0]!==null){const x=rect.x+head[0]*rect.w,y=rect.y+head[1]*rect.h;ctx.globalAlpha=.95;ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,2.1*d,0,Math.PI*2);ctx.fill();}}ctx.globalAlpha=1;ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(rect.x+10,rect.y+10,88,26);ctx.fillStyle='#fff';ctx.font=`${12*d}px system-ui,sans-serif`;ctx.fillText(`${end+1}/${item.frameCount}`,rect.x+20,rect.y+28);}
    function makeCard(item){const article=document.createElement('article');article.className='card';article.innerHTML=`<div class="stage"><img class="frame" alt=""><img class="mask" src="${esc(item.maskOverlay)}" alt=""><canvas></canvas></div><div class="meta"><h2>${esc(item.title)}</h2><p>${esc(item.videoTitle)}</p><p>${item.numMasks} SAM3 mask(s) · ${item.numTraces} projected mask-grid traces · ${item.frameCount} tracked frames</p><p><input class="scrub" type="range" min="0" max="${item.frameCount-1}" step="1" value="0"></p><p><a href="${esc(item.video)}" target="_blank" rel="noreferrer">source clip</a> · <a href="${esc(item.samOverlay)}" target="_blank" rel="noreferrer">SAM3 overlay</a> · <a href="${esc(item.firstFrame)}" target="_blank" rel="noreferrer">first frame</a></p></div>`;grid.appendChild(article);const frame=article.querySelector('img.frame'),canvas=article.querySelector('canvas'),scrub=article.querySelector('.scrub'),card={item,frame,canvas,frameIndex:0};cards.push(card);frame.addEventListener('load',()=>draw(card));scrub.addEventListener('input',()=>setFrame(card,Number(scrub.value)));setFrame(card,0);}
    DATA.items.forEach(makeCard);for(const input of [gain,alpha])input.addEventListener('input',()=>cards.forEach(draw));addEventListener('resize',()=>cards.forEach(draw));
  </script>
</body>
</html>
